          }
        ]
      };

      const params = new URLSearchParams(window.location.search);
      const categoria = params.get("categoria");
      const contenedor = document.getElementById("tarjetas");
      const titulo = document.getElementById("titulo-categoria");

      if (categoria) {
        titulo.textContent = "Creaciones de " + categoria.charAt(0).toUpperCase() + categoria.slice(1);
      }

      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxClose = document.getElementById("lightbox-close");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");

      let imagenesActuales = [];
      let indiceImagen = 0;

      if (productos[categoria]) {
        productos[categoria].forEach((p, idxProducto) => {
          const div = document.createElement("div");
          div.className = "tarjeta";

          // Mensaje para WhatsApp (codificado)
          const mensaje = encodeURIComponent(`Hola, estoy interesada en el producto "${p.nombre}". Aquí puedes ver la imagen: ${window.location.origin}/${p.imagenes[0]}`);
          const whatsappLink = `https://wa.me/593989149595?text=${mensaje}`;

          div.innerHTML = `
          <img src="${p.imagenes[0]}" alt="${p.nombre}" data-producto="${idxProducto}">
          <h3>${p.nombre}</h3>
          ${p.tamaño ? `<p><strong>Tamaño:</strong> ${p.tamaño}</p>` : ""}
          <p><strong>Precio:</strong> ${p.precio}</p>
          <a href="${whatsappLink}" target="_blank" class="boton-ordenar"><i class="fab fa-whatsapp"></i> Ordenar ahora</a>`;

          contenedor.appendChild(div);

          // Click en la imagen para abrir lightbox
          const img = div.querySelector("img");
          img.style.cursor = "pointer";
          img.addEventListener("click", () => {
            imagenesActuales = p.imagenes;
            indiceImagen = 0;
            abrirLightbox();
          });
        });
      } 
      else 
      {
        contenedor.innerHTML = "<p>No hay productos en esta categoría.</p>";
      }

      function abrirLightbox() {
        lightbox.classList.add("active");
        mostrarImagen();
      }

      function cerrarLightbox() {
        lightbox.classList.remove("active");
      }

      function mostrarImagen() {
        const archivo = imagenesActuales[indiceImagen];
        const esVideo = archivo.endsWith(".mp4");

        if (esVideo) {
          lightboxImg.style.display = "none";

          // Si ya existe un video previo, lo eliminamos
          const videoExistente = document.getElementById("lightbox-video");
          if (videoExistente) {
            videoExistente.remove();
          }

          const video = document.createElement("video");
          video.id = "lightbox-video";
          video.src = archivo;
          video.controls = true;
          video.autoplay = true;
          video.style.maxWidth = "90%";
          video.style.maxHeight = "80vh";

          document.querySelector(".lightbox-content").insertBefore(video, document.querySelector(".lightbox-nav"));
        } 
        else 
        {
          // Si había un video previo, lo eliminamos
          const videoExistente = document.getElementById("lightbox-video");
          if (videoExistente) {
            videoExistente.remove();
          }
          lightboxImg.src = archivo;
          lightboxImg.style.display = "block";
        }
      }
      lightboxClose.addEventListener("click", cerrarLightbox);

      prevBtn.addEventListener("click", () => {
        indiceImagen = (indiceImagen - 1 + imagenesActuales.length) % imagenesActuales.length;
        mostrarImagen();
      });

      nextBtn.addEventListener("click", () => {
        indiceImagen = (indiceImagen + 1) % imagenesActuales.length;
        mostrarImagen();
      });

      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) cerrarLightbox();
      });
